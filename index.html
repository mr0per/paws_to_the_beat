<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Paws to the Beat</title>
	<link rel="stylesheet" href="style.css" />
</head>
<body>
	<main class="viewport">
		<section class="scene" aria-label="Fish market scene with a cat">
			<div id="levelScreen" class="level-screen" role="dialog" aria-label="Choose level">
				<p class="level-screen-kicker">Paws to the Beat</p>
			<h1 class="level-screen-title">Select Level</h1>
			<p class="level-screen-subtitle">choose your level to begin</p>
				<div class="level-screen-actions">
					<button id="level1Button" class="level-circle-button" type="button" aria-label="Fish Catchers">
						<span class="level-circle-number">1</span>
						<span class="level-circle-label">fish catchers</span>
					</button>
					<button id="level2Button" class="level-circle-button" type="button" aria-label="Doggy Choir">
						<span class="level-circle-number">2</span>
						<span class="level-circle-label">doggy choir</span>					<span class="coming-soon">coming soon</span>					</button>
				</div>
			</div>
		<div id="gameOverScreen" class="end-screen is-hidden">
			<img src="images/end_screen.png" alt="End screen" />
			<h2>Round Complete!</h2>
			<p>you have caught: <span id="gameOverScore">0 FISH</span></p>
			<button id="replayButton" type="button">replay</button>
			<button id="levelSelectButton" type="button">level select</button>
		</div>
			<p id="fishCounter" class="fish-counter">Eaten: 0 | Missed: 0</p>
			<div id="gameControls" class="game-controls is-hidden" aria-label="Level controls">
				<button id="pauseButton" class="hud-button pause-icon-button" type="button" aria-label="Pause level" aria-pressed="false">
					<span class="pause-icon" aria-hidden="true"></span>
				</button>
				<button id="homeButton" class="hud-button home-icon-button" type="button" aria-label="Return to home screen">
					<svg class="home-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
						<path fill-rule="evenodd" d="M12 2.2 22.1 9.7l-1.3 1.7-1.8-1.3V20a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1v-9.9l-1.8 1.3-1.3-1.7L12 2.2Zm-1.8 18.8h3.6v-6.9a1.8 1.8 0 1 0-3.6 0V21Z" />
					</svg>
				</button>
			</div>
			<video id="inputVideo" class="input-video" playsinline autoplay muted width="640" height="480"></video>
			<div id="fishLandedLayer" class="fish-landed-layer" aria-hidden="true"></div>

			<img class="layer layer-level2-bg level-2-only" src="images/color_background.png" alt="Warm yellow background" />
			<img class="layer layer-level2-floor level-2-only" src="images/floor.png" alt="Floor" />
			<img class="layer layer-level2-dog1 level-2-only" src="images/dog1.png" alt="Dog layer one" />
			<img class="layer layer-level2-dog2 level-2-only" src="images/dog2.png" alt="Dog layer two" />
			<img class="layer layer-level2-dog3 level-2-only" src="images/dog3.png" alt="Dog layer three" />
			<img class="layer layer-level2-dog4 level-2-only" src="images/dog4.png" alt="Dog layer four" />

			<img class="layer layer-wall level-1-only" src="images/wall.png" alt="Blue brick wall background" />
			<img class="layer layer-crates level-1-only" src="images/fish crates.png" alt="Fish crates in foreground" />

			<img
				id="catClosed"
				class="layer layer-cat level-1-only"
				src="images/animate_cat.gif"
				alt="Blue cat with closed-mouth animation"
			/>
			<img
				id="catOpen"
				class="layer layer-cat level-1-only is-hidden"
				src="images/mouth open.png"
				alt="Blue cat meowing"
			/>
			<img
				id="catYuck"
				class="layer layer-cat level-1-only is-hidden"
				src="images/yuck!.png"
				alt="Blue cat reacting to pufferfish"
			/>
			<img
				id="dogClosed"
				class="layer layer-dog level-2-only is-hidden"
				src="images/closed mouth dog.png"
				alt="Brown dog with closed mouth"
			/>
			<img
				id="dogOpen"
				class="layer layer-dog level-2-only is-hidden"
				src="images/open mouth dog.png"
				alt="Brown dog with open mouth"
			/>

			<div id="countdownOverlay" class="countdown-overlay" aria-live="polite" aria-atomic="true"></div>
			<div id="eventFeedbackLayer" class="event-feedback-layer" aria-hidden="true"></div>
			<div id="clapCueOverlay" class="clap-cue-overlay" aria-hidden="true">
				<p id="clapCueText" class="clap-cue-text"></p>
				<img class="clap-cue-hand" src="images/hand_clap.png" alt="" aria-hidden="true" />
			</div>
			<div id="fishFlightLayer" class="fish-flight-layer" aria-hidden="true"></div>
		</section>
	</main>

	<script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
	<script src="sketch.js?v=20260328a"></script>
</body>
</html>
