<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Paws to the Beat</title>
	<link rel="stylesheet" href="style.css" />
</head>
<body>
	<main class="viewport">
		<section class="scene" aria-label="Fish market scene with a cat">
			<div id="levelScreen" class="level-screen" role="dialog" aria-label="Choose level">
				<p class="level-screen-kicker">Paws to the Beat</p>
				<h1 class="level-screen-title">Select Level</h1>
				<p class="level-screen-subtitle">Choose your challenge level to begin.</p>
				<div class="level-screen-actions">
					<button id="level1Button" class="level-circle-button" type="button" aria-label="Level 1">
						<span class="level-circle-number">1</span>
						<span class="level-circle-label">Level 1</span>
					</button>
					<button id="level2Button" class="level-circle-button" type="button" aria-label="Level 2">
						<span class="level-circle-number">2</span>
						<span class="level-circle-label">Level 2</span>
					</button>
				</div>
			</div>
			<div id="gameOverScreen" class="level-screen is-hidden" role="dialog" aria-label="Round complete">
				<p class="level-screen-kicker">Round Complete</p>
				<h2 class="level-screen-title">Music Finished</h2>
				<p class="level-screen-subtitle">Choose what to do next.</p>
				<div class="level-screen-actions">
					<button id="replayButton" class="level-button" type="button">Replay</button>
					<button id="levelSelectButton" class="level-button" type="button">Level Select</button>
				</div>
			</div>
			<p id="trackerStatus" class="tracker-status">Starting hand tracking...</p>
			<pre id="trackerDebug" class="tracker-debug">Waiting for camera...</pre>
			<p id="fishCounter" class="fish-counter">Eaten: 0 | Missed: 0</p>
			<button id="muteButton" class="mute-button" type="button" aria-label="Mute music" aria-pressed="false">🔊</button>
			<video id="inputVideo" class="input-video" playsinline autoplay muted width="640" height="480"></video>
			<div id="fishLandedLayer" class="fish-landed-layer" aria-hidden="true"></div>

			<img class="layer layer-level2-bg level-2-only" src="images/color_background.png" alt="Warm yellow background" />
			<img class="layer layer-level2-floor level-2-only" src="images/floor.png" alt="Floor" />
			<img class="layer layer-level2-dog1 level-2-only" src="images/dog1.png" alt="Dog layer one" />
			<img class="layer layer-level2-dog2 level-2-only" src="images/dog2.png" alt="Dog layer two" />
			<img class="layer layer-level2-dog3 level-2-only" src="images/dog3.png" alt="Dog layer three" />
			<img class="layer layer-level2-dog4 level-2-only" src="images/dog4.png" alt="Dog layer four" />

			<img class="layer layer-wall level-1-only" src="images/wall.png" alt="Blue brick wall background" />
			<img class="layer layer-crates level-1-only" src="images/fish crates.png" alt="Fish crates in foreground" />

			<img
				id="catClosed"
				class="layer layer-cat level-1-only"
				src="images/mouth closed.png"
				alt="Blue cat looking at fish"
			/>
			<img
				id="catOpen"
				class="layer layer-cat level-1-only is-hidden"
				src="images/mouth open.png"
				alt="Blue cat meowing"
			/>
			<img
				id="dogClosed"
				class="layer layer-dog level-2-only is-hidden"
				src="images/closed mouth dog.png"
				alt="Brown dog with closed mouth"
			/>
			<img
				id="dogOpen"
				class="layer layer-dog level-2-only is-hidden"
				src="images/open mouth dog.png"
				alt="Brown dog with open mouth"
			/>

			<div id="countdownOverlay" class="countdown-overlay" aria-live="polite" aria-atomic="true"></div>
			<div id="fishFlightLayer" class="fish-flight-layer" aria-hidden="true"></div>
		</section>
	</main>

	<script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
	<script src="sketch.js?v=20260324b"></script>
</body>
</html>
